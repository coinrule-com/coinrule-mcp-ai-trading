name: Publish MCP Registry

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-mcp-registry
  cancel-in-progress: false

jobs:
  publish:
    name: Validate and publish
    runs-on: ubuntu-latest
    environment: mcp-registry

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify manifest identity and version
        shell: bash
        run: |
          set -euo pipefail

          expected_name="io.github.coinrule-com/coinrule-mcp"
          actual_name="$(jq -er '.name' server.json)"

          if [[ "${actual_name}" != "${expected_name}" ]]; then
            echo "::error::server.json name must be ${expected_name}; found ${actual_name}"
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            manifest_version="$(jq -er '.version' server.json)"
            tag_version="${GITHUB_REF_NAME#v}"

            if [[ "${manifest_version}" != "${tag_version}" ]]; then
              echo "::error::Tag version ${tag_version} does not match server.json version ${manifest_version}"
              exit 1
            fi
          fi

      - name: Install MCP publisher
        shell: bash
        env:
          MCP_PUBLISHER_VERSION: v1.8.0
          MCP_PUBLISHER_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
        run: |
          set -euo pipefail

          archive="mcp-publisher_linux_amd64.tar.gz"
          url="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${archive}"

          curl --fail --location --silent --show-error --output "${archive}" "${url}"
          echo "${MCP_PUBLISHER_SHA256}  ${archive}" | sha256sum --check -
          tar -xzf "${archive}" mcp-publisher
          chmod +x mcp-publisher

      - name: Validate registry manifest
        run: ./mcp-publisher validate server.json

      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish server.json
